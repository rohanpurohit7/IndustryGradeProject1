<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#0b1320"/><stop offset="1" stop-color="#111827"/></linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#1f2937"/><stop offset="1" stop-color="#121a27"/></linearGradient>
  <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-opacity=".4"/></filter>
</defs>
<rect width="1600" height="980" fill="url(#bg)"/>
<rect x="0" y="0" width="1600" height="88" fill="#171f2c"/>
<text x="48" y="55" fill="#f8fafc" font-family="Segoe UI,Arial" font-size="30" font-weight="700">Amazon Managed Grafana — Retail Application Operations</text>
<text x="1240" y="54" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="16">Data source: Amazon Managed Service for Prometheus</text>

<g font-family="Segoe UI,Arial" filter="url(#shadow)">
<g transform="translate(40 120)"><rect width="350" height="160" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="17">Available replicas</text><text x="24" y="102" fill="#4ade80" font-size="54" font-weight="700">3 / 3</text><text x="24" y="137" fill="#94a3b8" font-size="15">Deployment: retail-portal</text></g>
<g transform="translate(420 120)"><rect width="350" height="160" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="17">Request rate</text><text x="24" y="102" fill="#38bdf8" font-size="54" font-weight="700">42.7</text><text x="200" y="102" fill="#94a3b8" font-size="20">req/s</text><text x="24" y="137" fill="#94a3b8" font-size="15">5-minute rolling rate</text></g>
<g transform="translate(800 120)"><rect width="350" height="160" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="17">p95 latency</text><text x="24" y="102" fill="#fbbf24" font-size="54" font-weight="700">182</text><text x="185" y="102" fill="#94a3b8" font-size="20">ms</text><text x="24" y="137" fill="#94a3b8" font-size="15">Target SLO: &lt; 300 ms</text></g>
<g transform="translate(1180 120)"><rect width="350" height="160" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="17">5xx error rate</text><text x="24" y="102" fill="#fb7185" font-size="54" font-weight="700">0.31%</text><text x="24" y="137" fill="#94a3b8" font-size="15">Alert threshold: 5%</text></g>

<g transform="translate(40 315)"><rect width="730" height="280" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="18">Requests by status code</text><line x1="55" y1="225" x2="685" y2="225" stroke="#475569"/><line x1="55" y1="80" x2="55" y2="225" stroke="#475569"/><polyline points="55,190 120,175 185,180 250,150 315,138 380,120 445,132 510,105 575,96 640,112 685,88" fill="none" stroke="#38bdf8" stroke-width="5"/><polyline points="55,215 120,213 185,214 250,210 315,208 380,211 445,206 510,205 575,203 640,205 685,202" fill="none" stroke="#fb7185" stroke-width="4"/><text x="580" y="63" fill="#38bdf8" font-size="14">2xx</text><text x="635" y="63" fill="#fb7185" font-size="14">5xx</text></g>
<g transform="translate(800 315)"><rect width="730" height="280" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="18">CPU by Pod</text><line x1="55" y1="225" x2="685" y2="225" stroke="#475569"/><line x1="55" y1="80" x2="55" y2="225" stroke="#475569"/><polyline points="55,170 125,155 195,162 265,145 335,151 405,138 475,149 545,132 615,142 685,127" fill="none" stroke="#4ade80" stroke-width="4"/><polyline points="55,188 125,181 195,176 265,184 335,168 405,174 475,160 545,166 615,154 685,159" fill="none" stroke="#c084fc" stroke-width="4"/><polyline points="55,200 125,193 195,198 265,187 335,190 405,180 475,185 545,176 615,181 685,172" fill="none" stroke="#fbbf24" stroke-width="4"/></g>

<g transform="translate(40 630)"><rect width="730" height="270" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="18">Memory working set</text><rect x="70" y="95" width="150" height="120" rx="8" fill="#2563eb"/><rect x="290" y="112" width="150" height="103" rx="8" fill="#7c3aed"/><rect x="510" y="82" width="150" height="133" rx="8" fill="#d97706"/><text x="145" y="240" text-anchor="middle" fill="#cbd5e1" font-size="14">Pod 1 — 410 MiB</text><text x="365" y="240" text-anchor="middle" fill="#cbd5e1" font-size="14">Pod 2 — 398 MiB</text><text x="585" y="240" text-anchor="middle" fill="#cbd5e1" font-size="14">Pod 3 — 425 MiB</text></g>
<g transform="translate(800 630)"><rect width="730" height="270" rx="16" fill="url(#panel)" stroke="#334155"/><text x="24" y="38" fill="#cbd5e1" font-size="18">Active alerts and response state</text><rect x="35" y="70" width="660" height="55" rx="10" fill="#173b2d"/><text x="55" y="103" fill="#86efac" font-size="16">Healthy — all replicas available</text><rect x="35" y="140" width="660" height="55" rx="10" fill="#3b2f17"/><text x="55" y="173" fill="#fde68a" font-size="16">Warning — p95 latency near 300 ms SLO</text><rect x="35" y="210" width="660" height="40" rx="10" fill="#40202a"/><text x="55" y="236" fill="#fda4af" font-size="16">No critical alerts firing</text></g>
</g>
<text x="40" y="950" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="15">Illustrative mockup for learning. Metrics and values are synthetic; configure real dashboards in Amazon Managed Grafana using AMP PromQL queries.</text>
</svg>